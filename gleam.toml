name = "iaragon"
# Rolling release: this field never changes (no tags, no changelog); it
# exists because the standard scaffold carries it.
version = "1.0.0"
target = "erlang"
description = "Bidirectional Google Drive sync daemon for Linux, on the BEAM"
licences = ["Apache-2.0"]
# stdlib APIs used here (e.g. bit_array base64) need this compiler line and
# Erlang/OTP >= 26 at runtime.
gleam = ">= 1.17.0"
# A daemon, not a library: no module is a public API.
internal_modules = ["iaragon/*"]

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
gleam_crypto = ">= 1.6.0 and < 2.0.0"
gleam_otp = ">= 1.2.0 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
simplifile = ">= 2.6.0 and < 3.0.0"
filepath = ">= 1.1.0 and < 2.0.0"
envoy = ">= 1.2.0 and < 2.0.0"
sqlight = ">= 1.2.0 and < 2.0.0"
filespy = ">= 0.7.0 and < 1.0.0"
polly = ">= 3.1.0 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.11.0 and < 2.0.0"
